<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Shared Drawing Wall</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { 
      width: 100%; 
      height: 100%; 
      overflow: hidden; 
      background: #000000;
    }
    #live-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
    }
    #conn-status {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 10;
      font-family: system-ui, sans-serif;
      font-size: 13px;
      font-weight: bold;
      color: #333;
      opacity: 0.5;
    }
  </style>
</head>
<body>

  <canvas id="live-canvas"></canvas>
  <div id="conn-status">Connected</div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, onChildAdded, onChildRemoved } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCto1Pr0e-08sur96xlRPtxdQ5zrH0UdGk",
      authDomain: "drawing-toge.firebaseapp.com",
      databaseURL: "https://drawing-toge-default-rtdb.europe-west1.firebasedatabase.app/",
      projectId: "drawing-toge"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const liveCanvas = document.getElementById("live-canvas");
    const ctx = liveCanvas.getContext("2d", { alpha: true });

    let activeStrokes = {};
    let activePointUnsubs = {};

    function resize() {
      liveCanvas.width = window.innerWidth;
      liveCanvas.height = window.innerHeight;
    }
    window.addEventListener("resize", resize);
    resize();

    // Pseudo-random generator for stable spray grain patterns
    function seededRandom(seedStr, i) {
      let h = 0;
      for (let k = 0; k < seedStr.length; k++) h += seedStr.charCodeAt(k) * (k + 1);
      const x = Math.sin(h * 12.9898 + i * 78.233) * 43758.5453;
      return x - Math.floor(x);
    }

    // ---------------- OPTIMIZED DRAWING ENGINE (NO LAG) ----------------
    function drawFrame() {
      ctx.clearRect(0, 0, liveCanvas.width, liveCanvas.height);
      
      const w = liveCanvas.width;
      const h = liveCanvas.height;

      for (const id in activeStrokes) {
        const stroke = activeStrokes[id];
        const pts = stroke.points;
        if (!pts || pts.length < 2) continue;

        ctx.save();

        if (stroke.style === "pencil") {
          // PENCIL: fast, clean line
          ctx.lineCap = "round";
          ctx.lineJoin = "round";
          ctx.strokeStyle = stroke.color;
          ctx.globalAlpha = 0.9;
          ctx.lineWidth = stroke.size * 0.3;
          ctx.beginPath();
          ctx.moveTo(pts[0].x * w, pts[0].y * h);
          for (let i = 1; i < pts.length; i++) {
            ctx.lineTo(pts[i].x * w, pts[i].y * h);
          }
          ctx.stroke();

        } else if (stroke.style === "drops") {
          // PAINT DROPS: each point of the stroke is a drop that appears,
          // expands softly, and then fades away over time.
          const now = performance.now();
          const life = 1400; // lifetime of each drop (ms)

          for (let i = 0; i < pts.length; i++) {
            const p = pts[i];
            const age = now - (p._t || now);
            if (age > life) continue;

            const px = p.x * w;
            const py = p.y * h;

            const variance = 0.7 + seededRandom(id, i * 5) * 0.6; // 0.7 - 1.3
            const maxRadius = stroke.size * variance;

            let radius, alpha;
            if (age < 350) {
              // expansion phase (ease-out)
              const t = age / 350;
              radius = maxRadius * Math.sin((t * Math.PI) / 2);
              alpha = 0.55;
            } else {
              // fade phase, with a slight residual "bleed"
              const t = (age - 350) / (life - 350);
              radius = maxRadius * (1 + t * 0.35);
              alpha = 0.55 * (1 - t);
            }

            ctx.fillStyle = stroke.color;

            // soft outer halo
            ctx.globalAlpha = alpha * 0.35;
            ctx.beginPath();
            ctx.arc(px, py, radius * 1.4, 0, Math.PI * 2);
            ctx.fill();

            // drop body
            ctx.globalAlpha = alpha;
            ctx.beginPath();
            ctx.arc(px, py, radius, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.globalAlpha = 1.0;

        } else if (stroke.style === "splat") {
          // SPLAT: irregular, randomly-shaped paint splotches with small
          // scattered droplets around them, fading away over time.
          const now = performance.now();
          const life = 1600; // lifetime of each splat (ms)

          for (let i = 0; i < pts.length; i++) {
            const p = pts[i];
            const age = now - (p._t || now);
            if (age > life) continue;

            const px = p.x * w;
            const py = p.y * h;

            let scale, alpha;
            if (age < 150) {
              // quick pop-in
              scale = age / 150;
              alpha = 0.75;
            } else {
              scale = 1.0;
              const t = (age - 150) / (life - 150);
              alpha = 0.75 * (1 - t);
            }
            alpha = Math.max(alpha, 0);

            const baseRadius = stroke.size * 0.7 * scale;

            // irregular blob shape: vertices at randomized radii around the center
            const vertices = 10;
            ctx.fillStyle = stroke.color;
            ctx.globalAlpha = alpha;
            ctx.beginPath();
            for (let k = 0; k <= vertices; k++) {
              const angle = (k / vertices) * Math.PI * 2;
              const rand = 0.55 + seededRandom(id, i * 31 + k * 7) * 0.9; // 0.55 - 1.45
              const r = baseRadius * rand;
              const vx = px + Math.cos(angle) * r;
              const vy = py + Math.sin(angle) * r;
              if (k === 0) ctx.moveTo(vx, vy);
              else ctx.lineTo(vx, vy);
            }
            ctx.closePath();
            ctx.fill();

            // small scattered satellite droplets around the main splat
            const satellites = 4;
            for (let s = 0; s < satellites; s++) {
              const seedIdx = i * 50 + s * 9;
              const sAngle = seededRandom(id, seedIdx) * Math.PI * 2;
              const sDist = baseRadius * (1.1 + seededRandom(id, seedIdx * 3) * 0.9);
              const sRadius = baseRadius * (0.12 + seededRandom(id, seedIdx * 5) * 0.18);
              const sx = px + Math.cos(sAngle) * sDist;
              const sy = py + Math.sin(sAngle) * sDist;

              ctx.beginPath();
              ctx.arc(sx, sy, sRadius, 0, Math.PI * 2);
              ctx.fill();
            }
          }
          ctx.globalAlpha = 1.0;

        } else if (stroke.style === "spray") {
          // SPRAY: intense and clearly visible
          ctx.fillStyle = stroke.color;
          const grainsPerPoint = 170;

          for (let i = 0; i < pts.length; i++) {
            const px = pts[i].x * w;
            const py = pts[i].y * h;

            for (let g = 0; g < grainsPerPoint; g++) {
              const idx = i * grainsPerPoint + g;
              const angle = seededRandom(id, idx * 3) * Math.PI * 2;

              // REDUCED RADIUS (stroke.size * 0.6):
              // keeps grains close to the finger, making the spray compact.
              const radius = seededRandom(id, idx * 7) * (stroke.size * 0.6);

              const gx = px + Math.cos(angle) * radius;
              const gy = py + Math.sin(angle) * radius;

              // bigger, denser grains for a much more noticeable effect
              const randomSelector = seededRandom(id, idx * 13);
              const dotSize = randomSelector > 0.8 ? 3.5 : 2.0;

              // near-full alpha for a solid, clearly visible result
              ctx.globalAlpha = 0.95;
              ctx.fillRect(gx, gy, dotSize, dotSize);
            }
          }
          ctx.globalAlpha = 1.0;
        }
        ctx.restore();
      }

      requestAnimationFrame(drawFrame);
    }
    requestAnimationFrame(drawFrame);

    // ---------------- REALTIME LISTENERS ----------------
    const activeRef = ref(db, "strokes/active");

    onChildAdded(activeRef, (snapshot) => {
      const strokeId = snapshot.key;
      const data = snapshot.val() || {};

      activeStrokes[strokeId] = {
        color: data.color,
        size: data.size,
        style: data.style,
        points: []
      };

      const pointsRef = ref(db, `strokes/active/${strokeId}/points`);
      const unsub = onChildAdded(pointsRef, (ptSnap) => {
        if (activeStrokes[strokeId]) {
          const val = ptSnap.val();
          val._t = performance.now(); // local arrival timestamp, used to animate drops/splat
          activeStrokes[strokeId].points.push(val);
        }
      });
      activePointUnsubs[strokeId] = unsub;
    });

    // Add a 1.5s grace period before removing the stroke
    onChildRemoved(activeRef, (snapshot) => {
      const strokeId = snapshot.key;
      
      // Stop listening for new points immediately
      if (activePointUnsubs[strokeId]) {
        activePointUnsubs[strokeId]();
        delete activePointUnsubs[strokeId];
      }

      // Instead of deleting right away, wait 1.5 seconds
      setTimeout(() => {
        delete activeStrokes[strokeId];
      }, 1500); 
    });
  </script>
</body>
</html>
