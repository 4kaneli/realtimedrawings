<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Shared Drawing Wall</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { 
      width: 100%; 
      height: 100%; 
      overflow: hidden; 
      background: url('6385.jpg') center center / cover no-repeat fixed;
    }
    #live-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
    }
    #conn-status {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 10;
      font-family: system-ui, sans-serif;
      font-size: 13px;
      font-weight: bold;
      color: #333;
      opacity: 0.5;
    }
  </style>
</head>
<body>

  <canvas id="live-canvas"></canvas>
  <div id="conn-status">Connected</div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, onChildAdded, onChildRemoved } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCto1Pr0e-08sur96xlRPtxdQ5zrH0UdGk",
      authDomain: "drawing-toge.firebaseapp.com",
      databaseURL: "https://drawing-toge-default-rtdb.europe-west1.firebasedatabase.app/",
      projectId: "drawing-toge"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const liveCanvas = document.getElementById("live-canvas");
    const ctx = liveCanvas.getContext("2d", { alpha: true });

    let activeStrokes = {};
    let activePointUnsubs = {};

    function resize() {
      liveCanvas.width = window.innerWidth;
      liveCanvas.height = window.innerHeight;
    }
    window.addEventListener("resize", resize);
    resize();

    // Generatore pseudo-casuale per la grana stabile dello spray
    function seededRandom(seedStr, i) {
      let h = 0;
      for (let k = 0; k < seedStr.length; k++) h += seedStr.charCodeAt(k) * (k + 1);
      const x = Math.sin(h * 12.9898 + i * 78.233) * 43758.5453;
      return x - Math.floor(x);
    }

    // ---------------- MOTORE GRAFICO OTTIMIZZATO (NIENTE LAG) ----------------
    function drawFrame() {
      ctx.clearRect(0, 0, liveCanvas.width, liveCanvas.height);
      
      const w = liveCanvas.width;
      const h = liveCanvas.height;

      for (const id in activeStrokes) {
        const stroke = activeStrokes[id];
        const pts = stroke.points;
        if (!pts || pts.length < 2) continue;

        ctx.save();

        if (stroke.style === "pencil") {
          // PENCIL: Linea super veloce e pulita
          ctx.lineCap = "round";
          ctx.lineJoin = "round";
          ctx.strokeStyle = stroke.color;
          ctx.globalAlpha = 0.9;
          ctx.lineWidth = stroke.size * 0.3;
          ctx.beginPath();
          ctx.moveTo(pts[0].x * w, pts[0].y * h);
          for (let i = 1; i < pts.length; i++) {
            ctx.lineTo(pts[i].x * w, pts[i].y * h);
          }
          ctx.stroke();

        } else if (stroke.style === "watercolor") {
  // ACQUERELLO LINEARE: Tratto continuo, frastagliato, zero cerchietti
  ctx.lineCap = "round";
  ctx.lineJoin = "round";
  ctx.lineWidth = stroke.size * 1.2;

  // Estraiamo il colore
  let hex = stroke.color.replace('#', '');
  let r = parseInt(hex.substring(0, 2), 16);
  let g = parseInt(hex.substring(2, 4), 16);
  let b = parseInt(hex.substring(4, 6), 16);

  // Per essere lineare e senza pallini, dobbiamo fare un unico percorso (beginPath)
  // Per fare l'effetto sbiadito, disegneremo più strati o useremo un gradiente.
  // Qui usiamo una tecnica "Layering" leggera: un unico tratto continuo.
  
  ctx.beginPath();
  
  // Applichiamo una leggera vibrazione "frastagliata" ai punti
  for (let i = 0; i < pts.length; i++) {
    // Aggiungiamo un leggero "disturbo" per l'effetto frastagliato (jitter)
    const jitter = (seededRandom(id, i) - 0.5) * (stroke.size * 0.3);
    const px = pts[i].x * w + jitter;
    const py = pts[i].y * h + jitter;

    if (i === 0) ctx.moveTo(px, py);
    else ctx.lineTo(px, py);
  }

  // Per lo sbiadimento (parte scuro -> chiara), disegniamo il tratto 
  // con un'opacità media e un colore solido.
  ctx.strokeStyle = `rgba(${r}, ${g}, ${b}, 0.5)`;
  ctx.stroke();
  
  // Se vuoi l'effetto "consumo del colore" (che sbiadisce), 
  // la soluzione più fluida è sovrapporre un leggero sfumato
  // (Questo non crea cerchietti perché è un unico path)
  ctx.globalAlpha = 0.3;
  ctx.lineWidth = stroke.size * 1.8;
  ctx.stroke();
  ctx.globalAlpha = 1.0;

        } else if (stroke.style === "spray") {
          // SPRAY COMPATTO E COMPLETAMENTE GRANULOSO
          ctx.fillStyle = stroke.color;
          // Aumentiamo la densità: 25 granuli per punto rendono il tratto molto "pieno"
          const grainsPerPoint = 145; 
          
          for (let i = 0; i < pts.length; i++) {
            const px = pts[i].x * w;
            const py = pts[i].y * h;

            for (let g = 0; g < grainsPerPoint; g++) {
              const idx = i * grainsPerPoint + g;
              const angle = seededRandom(id, idx * 3) * Math.PI * 2;
              
              // RAGGIO RIDOTTO (stroke.size * 0.6): 
              // Questo tiene i granuli vicini al dito, rendendo lo spray compatto.
              const radius = seededRandom(id, idx * 7) * (stroke.size * 0.6);
              
              const gx = px + Math.cos(angle) * radius;
              const gy = py + Math.sin(angle) * radius;

              // Dimensioni granuli per dare realismo
              const randomSelector = seededRandom(id, idx * 13);
              const dotSize = randomSelector > 0.85 ? 3.0 : 1.5; 

              // Alpha più alta per renderlo meno "fantasma" e più solido
              ctx.globalAlpha = 0.8;
              ctx.fillRect(gx, gy, dotSize, dotSize);
            }
          }
        }
        ctx.restore();
      }

      requestAnimationFrame(drawFrame);
    }
    requestAnimationFrame(drawFrame);

    // ---------------- REALTIME LISTENERS ----------------
    const activeRef = ref(db, "strokes/active");

    onChildAdded(activeRef, (snapshot) => {
      const strokeId = snapshot.key;
      const data = snapshot.val() || {};

      activeStrokes[strokeId] = {
        color: data.color,
        size: data.size,
        style: data.style,
        points: []
      };

      const pointsRef = ref(db, `strokes/active/${strokeId}/points`);
      const unsub = onChildAdded(pointsRef, (ptSnap) => {
        if (activeStrokes[strokeId]) {
          activeStrokes[strokeId].points.push(ptSnap.val());
        }
      });
      activePointUnsubs[strokeId] = unsub;
    });

    // MODIFICA QUI: Aggiungiamo il timer di 1.5 secondi
    onChildRemoved(activeRef, (snapshot) => {
      const strokeId = snapshot.key;
      
      // Smettiamo di ascoltare i nuovi punti immediatamente
      if (activePointUnsubs[strokeId]) {
        activePointUnsubs[strokeId]();
        delete activePointUnsubs[strokeId];
      }

      // Invece di cancellarlo subito, aspettiamo 1.5 secondi
      setTimeout(() => {
        delete activeStrokes[strokeId];
      }, 1500); 
    });
  </script>
</body>
</html>
